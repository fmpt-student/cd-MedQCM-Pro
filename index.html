<!DOCTYPE html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>MedQCM Pro - Plateforme de Révision</title>
    <!-- Tailwind via CDN pour le prototypage rapide -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              primary: {
                50: '#eff6ff',
                100: '#dbeafe',
                500: '#3b82f6',
                600: '#2563eb',
                700: '#1d4ed8',
              }
            }
          }
        }
      }
    </script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
      /* Styles de base pour éviter le flash blanc ou l'effondrement avant le chargement de Tailwind */
      html, body { margin: 0; padding: 0; height: 100%; width: 100%; }
      body { font-family: 'Inter', sans-serif; background-color: #f8fafc; color: #0f172a; }
      #root { height: 100%; display: flex; flex-direction: column; }
    </style>
</head>
  <body class="bg-slate-50 text-slate-900 h-screen overflow-hidden">
    <div id="root"></div>
    <!-- Point d'entrée corrigé vers le dossier src -->
    <script type="module" src="/src/index.tsx"></script>
  </body>
</html>
